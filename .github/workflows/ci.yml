name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Lint Code
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      # Optionally, you can add `npm run build` here to verify Next.js builds successfully.
      - name: Build Test
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
